---
- name: Validar espacio en disco en Linux
  hosts: os_linux
  gather_facts: no
  tasks:
    - name: Obtener información de uso de disco
      ansible.builtin.command: df -h /
      register: resultado_df
 
    - name: Mostrar resultado del comando df
      ansible.builtin.debug:
        var: resultado_df.stdout_lines
 
    - name: Validar que el uso de disco no supere el 80%
      ansible.builtin.shell: |
        uso=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
        if [ "$uso" -gt 80 ]; then
          echo "ERROR: Uso de disco mayor al 80% ($uso%)"
          exit 1
        else
          echo "OK: Uso de disco dentro del límite ($uso%)"
        fi
      register: validacion
      changed_when: false
 
    - name: Mostrar resultado de validación
      ansible.builtin.debug:
        msg: "{{ validacion.stdout }}"