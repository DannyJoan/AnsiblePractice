---
- name: Mantenimiento y Validación de Servidores Windows
  hosts: os_windows
  gather_facts: yes
  vars:
    umbral_cpu: 85
    umbral_disco: 80

  tasks:
    # 1. VALIDAR USO DE CPU
    - name: Obtener uso promedio de CPU (últimos 5 segundos)
      ansible.windows.win_powershell:
        script: |
          $cpu = (Get-CimInstance Win32_Processor | Measure-Object -Property LoadPercentage -Average).Average
          if ($cpu -gt {{ umbral_cpu }}) {
              Write-Output "ERROR: CPU al $cpu%"
              exit 1
          } else {
              Write-Output "OK: CPU al $cpu%"
          }
      register: cpu_check
      # Corregido: Solo falla si la palabra ERROR aparece en la salida
      failed_when: "'ERROR' in (cpu_check.output | join(' '))"

    # 2. CHEQUEAR SERVICIOS CRÍTICOS
    - name: Validar que servicios esenciales estén ejecutándose
      ansible.windows.win_service:
        name: "{{ item }}"
        state: started
      loop:
        - Spooler
        - LanmanServer
      register: service_status

    # 3. ESPACIO EN DISCO (C:)
    - name: Validar espacio en disco
      ansible.windows.win_powershell:
        script: |
          $drive = Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'"
          $percentUsed = [Math]::Round((($drive.Size - $drive.FreeSpace) / $drive.Size) * 100, 2)
          if ($percentUsed -gt {{ umbral_disco }}) {
              Write-Output "ERROR: Disco C: al $percentUsed%"
              exit 1
          } else {
              Write-Output "OK: Disco C: al $percentUsed%"
          }
      register: disco_check
      # Corregido: Cambiado .contains() por el operador 'in'
      failed_when: "'ERROR' in (disco_check.output | join(' '))"

    # 4. CREAR USUARIO 'ECUADOR'
    - name: Asegurar que el usuario 'ecuador' exista
      ansible.windows.win_user:
        name: ecuador
        password: "Cambiame123!" 
        state: present
        groups:
          - Usuarios  # Nota: En Windows en español el grupo es "Usuarios", no "Users"
          - Usuarios de escritorio remoto
        fullname: "Usuario Ecuador"

    # 5. ACTUALIZAR SISTEMA OPERATIVO
    - name: Instalar todas las actualizaciones críticas y de seguridad
      ansible.windows.win_updates:
        category_names:
          - CriticalUpdates
          - SecurityUpdates
        state: installed
      register: update_result

    # 6. REPORTE FINAL
    - name: Resumen de ejecución
      ansible.builtin.debug:
        msg: 
          # Accedemos de forma segura al primer elemento de la lista output
          - "CPU: {{ cpu_check.output | first | default('Sin datos') }}"
          - "Disco: {{ disco_check.output | first | default('Sin datos') }}"
          - "Actualizaciones instaladas: {{ update_result.installed_update_count | default(0) }}"
          - "Reinicio requerido: {{ update_result.reboot_required | default(false) }}"

    - name: Reiniciar si es necesario
      ansible.windows.win_reboot:
      when: update_result.reboot_required | default(false)
